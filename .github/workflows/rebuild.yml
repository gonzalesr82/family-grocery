name: Rebuild HEB Family Grocery App

on:
  schedule:
    - cron: '0 6 * * 0'   # Every Sunday at 6am UTC (1am San Antonio time)
  workflow_dispatch:        # Also lets you run it manually any time

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run HEB fetch script
        run: python heb_build.py

      - name: Commit and push updated index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Weekly HEB catalog update $(date +'%Y-%m-%d')"
          git push
